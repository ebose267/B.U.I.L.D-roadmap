<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Alix Robotics Mastery Roadmap | From Circuits to Humanoids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Clash Display for headings (geometric, editorial) + DM Mono for code/labels + Lora for body -->
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <!-- Fallback if Clash Display isn't available via Google yet — use Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Phase spectrum — deep to intense */
            --phase-1: #6B3FA0;
            --phase-2: #2B4A8C;
            --phase-3: #1A6E8C;
            --phase-4: #1A7A52;
            --phase-5: #B8891A;
            --phase-6: #C04A1E;
            --phase-7: #A01828;

            /* Dark theme (default) */
            --bg-base:      #0C0C0F;
            --bg-surface:   #131318;
            --bg-raised:    #1A1A22;
            --bg-card:      #1E1E28;
            --bg-hover:     rgba(255,255,255,0.04);
            --text-1:       #EEEEF2;
            --text-2:       #9999AA;
            --text-3:       #55556A;
            --border:       rgba(255,255,255,0.08);
            --border-mid:   rgba(255,255,255,0.12);
            --grid-color:   rgba(255,255,255,0.035);
            --shadow:       rgba(0,0,0,0.6);

            /* Accent */
            --accent:       #5B8CFF;
            --accent-dim:   rgba(91,140,255,0.15);

            --font-display: 'Outfit', 'Clash Display', sans-serif;
            --font-body:    'Lora', Georgia, serif;
            --font-mono:    'DM Mono', 'JetBrains Mono', monospace;
        }

        [data-theme="light"] {
            --bg-base:      #F4F4F7;
            --bg-surface:   #FFFFFF;
            --bg-raised:    #EBEBF0;
            --bg-card:      #FFFFFF;
            --bg-hover:     rgba(0,0,0,0.03);
            --text-1:       #12121A;
            --text-2:       #4A4A60;
            --text-3:       #9090A8;
            --border:       rgba(0,0,0,0.08);
            --border-mid:   rgba(0,0,0,0.12);
            --grid-color:   rgba(0,0,0,0.05);
            --shadow:       rgba(0,0,0,0.12);
            --accent:       #2D5FD4;
            --accent-dim:   rgba(45,95,212,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        /* ─── GRID BACKGROUND ─── */
        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            color: var(--text-1);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle vignette over grid */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, transparent 40%, var(--bg-base) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Everything above the grid */
        header, main, footer, .phase-nav { position: relative; z-index: 1; }

        /* ─── HEADER ─── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 66px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Alix Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            height: 34px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(91,140,255,0.25));
            transition: filter 0.3s;
        }

        .logo:hover .logo-img {
            filter: drop-shadow(0 0 14px rgba(91,140,255,0.5));
        }

        .logo-wordmark {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.04em;
            color: var(--text-1);
            opacity: 0.85;
        }

        .logo-divider {
            width: 1px;
            height: 20px;
            background: var(--border-mid);
            margin: 0 0.2rem;
        }

        .logo-sub {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        /* Nav */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-item { position: relative; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--text-2);
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--text-1);
            background: var(--bg-hover);
            border-color: var(--border);
        }

        .nav-link i.chevron {
            font-size: 0.6rem;
            transition: transform 0.2s;
        }

        .nav-item:hover .nav-link .chevron,
        .nav-link.menu-open .chevron { transform: rotate(180deg); }

        /* Theme toggle */
        .theme-toggle {
            width: 52px; height: 28px;
            background: var(--bg-raised);
            border: 1px solid var(--border-mid);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .toggle-knob {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--phase-1), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: white;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        [data-theme="light"] .toggle-knob {
            transform: translateX(24px);
            background: linear-gradient(135deg, var(--phase-5), var(--phase-6));
        }

        /* ─── MEGA MENU ─── */
        .mega-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(-6px);
            width: 680px;
            max-width: 92vw;
            background: var(--bg-surface);
            border: 1px solid var(--border-mid);
            border-radius: 14px;
            padding: 1.25rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
            box-shadow: 0 24px 64px var(--shadow);
            z-index: 999;
        }

        .nav-item:hover .mega-menu,
        .mega-menu.open {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .mega-menu-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 0.85rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        .mega-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
        }

        .mega-menu-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            border: 1px solid transparent;
        }

        .mega-menu-item:hover { background: var(--bg-hover); }
        .mega-menu-item.ph-1:hover { border-color: rgba(107,63,160,0.35); }
        .mega-menu-item.ph-2:hover { border-color: rgba(43,74,140,0.35); }
        .mega-menu-item.ph-3:hover { border-color: rgba(26,110,140,0.35); }
        .mega-menu-item.ph-4:hover { border-color: rgba(26,122,82,0.35); }
        .mega-menu-item.ph-5:hover { border-color: rgba(184,137,26,0.35); }
        .mega-menu-item.ph-6:hover { border-color: rgba(192,74,30,0.35); }
        .mega-menu-item.ph-7:hover { border-color: rgba(160,24,40,0.35); }

        .menu-badge {
            width: 30px; height: 30px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.8rem;
            color: white;
            flex-shrink: 0;
        }

        .ph-1 .menu-badge { background: var(--phase-1); }
        .ph-2 .menu-badge { background: var(--phase-2); }
        .ph-3 .menu-badge { background: var(--phase-3); }
        .ph-4 .menu-badge { background: var(--phase-4); }
        .ph-5 .menu-badge { background: var(--phase-5); }
        .ph-6 .menu-badge { background: var(--phase-6); }
        .ph-7 .menu-badge { background: var(--phase-7); }

        .menu-text-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-1);
            line-height: 1.3;
        }

        .menu-text-sub {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-3);
            letter-spacing: 0.05em;
        }

        /* ─── MAIN CONTAINER ─── */
        .main-container {
            margin-top: 66px;
            min-height: calc(100vh - 66px);
        }

        /* ─── HERO ─── */
        .hero {
            padding: 5rem 2rem 4rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--bg-surface) 0%, transparent 100%);
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.9rem;
            background: var(--bg-raised);
            border: 1px solid var(--border-mid);
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 1.75rem;
        }

        .hero-eyebrow span.dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--phase-5);
            display: inline-block;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5.5vw, 4rem);
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -0.03em;
            color: var(--text-1);
            margin-bottom: 1.25rem;
        }

        .hero-title em {
            font-style: normal;
            background: linear-gradient(135deg, var(--accent) 0%, var(--phase-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-style: italic;
            color: var(--text-2);
            max-width: 520px;
            margin: 0 auto 2.5rem;
            line-height: 1.75;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .hero-stat-value {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .hero-stat-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-top: 0.3rem;
        }

        /* ─── PROGRESS BAR ─── */
        .progress-strip {
            padding: 1rem 2rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }

        .progress-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .progress-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            white-space: nowrap;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: var(--bg-raised);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--phase-4), var(--accent));
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-pct {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--phase-4);
            white-space: nowrap;
            min-width: 2.8rem;
            text-align: right;
        }

        /* ─── PHASE NAV PILLS ─── */
        .phase-nav {
            display: flex;
            justify-content: center;
            gap: 0.35rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 66px;
            z-index: 100;
        }

        .phase-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.85rem;
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            color: var(--text-2);
            background: var(--bg-card);
        }

        .phase-pill:hover { transform: translateY(-2px); border-color: var(--border-mid); }

        .pill-num {
            width: 18px; height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-raised);
            color: var(--text-3);
            transition: background 0.2s, color 0.2s;
        }

        .phase-pill.active { color: white; border-color: transparent; }
        .phase-pill.active .pill-num { background: rgba(255,255,255,0.2); color: white; }

        .phase-pill.active.ph-1 { background: var(--phase-1); }
        .phase-pill.active.ph-2 { background: var(--phase-2); }
        .phase-pill.active.ph-3 { background: var(--phase-3); }
        .phase-pill.active.ph-4 { background: var(--phase-4); }
        .phase-pill.active.ph-5 { background: var(--phase-5); }
        .phase-pill.active.ph-6 { background: var(--phase-6); }
        .phase-pill.active.ph-7 { background: var(--phase-7); }

        /* ─── CONTENT ─── */
        .content-area {
            padding: 2.5rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Phase animations */
        .phase-content { animation: rise 0.4s cubic-bezier(0.16,1,0.3,1); }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fall {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(12px); }
        }

        .phase-content.exiting { animation: fall 0.25s ease forwards; }

        /* Phase title */
        .phase-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 0.5rem;
        }

        .phase-heading {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .phase-num-box {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
        }

        .ph-1 .phase-num-box { background: var(--phase-1); box-shadow: 0 0 24px rgba(107,63,160,0.3); }
        .ph-2 .phase-num-box { background: var(--phase-2); box-shadow: 0 0 24px rgba(43,74,140,0.3); }
        .ph-3 .phase-num-box { background: var(--phase-3); box-shadow: 0 0 24px rgba(26,110,140,0.3); }
        .ph-4 .phase-num-box { background: var(--phase-4); box-shadow: 0 0 24px rgba(26,122,82,0.3); }
        .ph-5 .phase-num-box { background: var(--phase-5); box-shadow: 0 0 24px rgba(184,137,26,0.3); }
        .ph-6 .phase-num-box { background: var(--phase-6); box-shadow: 0 0 24px rgba(192,74,30,0.3); }
        .ph-7 .phase-num-box { background: var(--phase-7); box-shadow: 0 0 24px rgba(160,24,40,0.3); }

        .phase-title-text {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-1);
            line-height: 1.15;
        }

        .phase-desc {
            font-family: var(--font-body);
            font-size: 0.97rem;
            line-height: 1.8;
            color: var(--text-2);
            padding: 1.25rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.75rem;
        }

        /* ─── SECTION CARDS ─── */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--bg-raised);
            border-bottom: 1px solid var(--border);
        }

        .section-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            color: white;
        }

        .section-icon.tools { background: var(--phase-3); }
        .section-icon.resources { background: var(--phase-5); }

        .section-label {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-1);
        }

        .section-count {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-3);
            letter-spacing: 0.1em;
        }

        .section-body { padding: 0.75rem; }

        /* ─── RESOURCE ROWS ─── */
        .resource-list { display: flex; flex-direction: column; gap: 0.25rem; }

        .resource-row {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 0.85rem;
            border-radius: 8px;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .resource-row:hover {
            background: var(--bg-hover);
            border-color: var(--border);
        }

        /* Checkbox */
        .check-box {
            width: 20px; height: 20px;
            border: 1.5px solid var(--border-mid);
            border-radius: 5px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .check-box:hover { border-color: var(--phase-4); }

        .check-box i {
            opacity: 0;
            font-size: 0.65rem;
            color: white;
            transition: opacity 0.15s;
        }

        .check-box.checked {
            background: var(--phase-4);
            border-color: var(--phase-4);
        }

        .check-box.checked i { opacity: 1; }

        /* Tag */
        .res-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .res-tag.video    { background: rgba(192,74,30,0.12);  color: #D4673A; border: 1px solid rgba(192,74,30,0.25); }
        .res-tag.course   { background: rgba(26,110,140,0.12); color: #3A9EC4; border: 1px solid rgba(26,110,140,0.25); }
        .res-tag.github   { background: rgba(107,63,160,0.12); color: #9B6FD4; border: 1px solid rgba(107,63,160,0.25); }
        .res-tag.tool     { background: rgba(26,122,82,0.12);  color: #2EA870; border: 1px solid rgba(26,122,82,0.25); }
        .res-tag.website  { background: rgba(43,74,140,0.12);  color: #6888CC; border: 1px solid rgba(43,74,140,0.25); }
        .res-tag.hardware { background: rgba(184,137,26,0.12); color: #C8A030; border: 1px solid rgba(184,137,26,0.25); }
        .res-tag.pdf      { background: rgba(160,24,40,0.12);  color: #D43050; border: 1px solid rgba(160,24,40,0.25); }

        /* Link */
        .res-link {
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-1);
            text-decoration: none;
            transition: color 0.15s;
            flex: 1;
        }

        .res-link:hover { color: var(--accent); }

        .res-link-icon {
            font-size: 0.65rem;
            margin-left: 0.3rem;
            opacity: 0.4;
        }

        /* ─── HOME OVERVIEW CARDS ─── */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .overview-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-mid);
            box-shadow: 0 12px 32px var(--shadow);
        }

        .overview-card-head {
            padding: 1.1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.85rem;
            color: white;
        }

        .overview-card-num {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            opacity: 0.3;
        }

        .overview-card-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.92rem;
            line-height: 1.3;
        }

        .overview-card-body { padding: 1rem 1.25rem; }

        .overview-card-desc {
            font-family: var(--font-body);
            font-size: 0.84rem;
            line-height: 1.65;
            color: var(--text-2);
            margin-bottom: 0.85rem;
        }

        .overview-card-meta {
            display: flex;
            gap: 1rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .empty-state-icon {
            font-size: 2.5rem;
            color: var(--text-3);
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 0.6rem;
        }

        .empty-state-body {
            font-family: var(--font-body);
            font-style: italic;
            font-size: 0.92rem;
            color: var(--text-3);
            line-height: 1.7;
        }

        /* ─── FOOTER ─── */
        .footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            background: var(--bg-surface);
            margin-top: 4rem;
        }

        .footer-text {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        .footer-heart { color: var(--phase-7); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .header { padding: 0 1rem; }
            .nav-container { gap: 0.75rem; }
            .logo-wordmark, .logo-divider, .logo-sub { display: none; }

            .mega-menu {
                width: 96vw;
                left: 2%;
                /* On mobile: kill the translateX so menu doesn't go off-screen */
                transform: translateY(-6px);
            }

            .mega-menu.open,
            .nav-item:hover .mega-menu {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            /* Prevent hover from showing on mobile (touch devices) */
            @media (hover: none) {
                .nav-item:hover .mega-menu:not(.open) {
                    opacity: 0;
                    visibility: hidden;
                    transform: translateY(-6px);
                }
            }

            .mega-menu-grid { grid-template-columns: 1fr; }

            .phase-nav { padding: 0.75rem 1rem; }
            .phase-pill .pill-text { display: none; }
            .phase-pill { padding: 0.45rem 0.6rem; }

            .content-area { padding: 1.25rem 1rem; }
            .phase-title-text { font-size: 1.3rem; }
            .hero { padding: 3rem 1.25rem 2.5rem; }
            .hero-stats { gap: 2rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
        ::selection { background: var(--accent); color: white; }
    </style>
</head>

        const icon = document.getElementById('themeIcon');
        if (icon) icon.className = t === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    }

    function toggleTheme() {
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
    }

                <div class="menu-badge">${p.id}</div>
                <div>
                    <div class="menu-text-title">${p.shortTitle}</div>
                    <div class="menu-text-sub">Phase ${p.id} &nbsp;·&nbsp; ${p.tools.length + p.resources.length} items</div>
                </div>
            </div>
        `).join('');
    }

    function toggleMegaMenu(e) {
        e.stopPropagation();
        const m = document.getElementById('megaMenu');
        const btn = document.getElementById('phasesNavBtn');
        m.classList.toggle('open');
        btn.classList.toggle('menu-open');
    }

    function closeMegaMenu() {
        document.getElementById('megaMenu').classList.remove('open');
        document.getElementById('phasesNavBtn').classList.remove('menu-open');
    }

        const menu = document.getElementById('megaMenu');
        if (menu && !e.target.closest('.nav-item')) closeMegaMenu();

        if (currentPhase === id) return;

        const existing  = container.querySelector('.phase-content');

        if (existing) {
            existing.classList.add('exiting');
            const target = id;
            pendingRender = setTimeout(() => {
                pendingRender = null;
                renderPhase(target);
                updateActivePill();
            }, 250);
        } else {
            renderPhase(id);
            updateActivePill();
        }
    }

    // ════════════════════════════════════════════════
    //  RENDER HELPERS
    // ════════════════════════════════════════════════
    function pillsHTML(activeId) {
        return phasesData.map(p => `
            <div class="phase-pill ph-${p.id} ${p.id === activeId ? 'active' : ''}" onclick="showPhase(${p.id})">
                <span class="pill-num">${p.id}</span>
                <span class="pill-text">${p.shortTitle}</span>
            </div>
        `).join('');
    }

    function progressHTML() {
        return `
            <div class="progress-strip">
                <div class="progress-inner">
                    <span class="progress-label">Progress</span>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <span class="progress-pct" id="progressValue">0%</span>
                </div>
            </div>
        `;
    }

    function resourceRowHTML(item, itemId) {
        const checked = checkedItems[itemId] ? 'checked' : '';
        return `
            <div class="resource-row">
                <div class="check-box ${checked}" onclick="toggleCheck('${itemId}', this)">
                    <i class="fas fa-check"></i>
                </div>
                <span class="res-tag ${item.tagClass}">
                    <i class="fas ${item.icon}"></i> ${item.tag}
                </span>
                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="res-link">
                    ${item.name}<i class="fas fa-arrow-up-right-from-square res-link-icon"></i>
                </a>
            </div>
        `;
    }

    // ════════════════════════════════════════════════
    //  RENDER HOME
    // ════════════════════════════════════════════════
    function renderHome() {
        const total     = phasesData.reduce((a, p) => a + p.resources.length, 0);
        const toolCount = phasesData.reduce((a, p) => a + p.tools.length, 0);

        document.getElementById('mainContainer').innerHTML = `
            <div class="phase-content">
                <section class="hero">
                    <div class="hero-eyebrow">
                        <span class="dot"></span>
                        Project B.U.I.L.D. &nbsp;·&nbsp; Complete Roadmap
                    </div>
                    <h1 class="hero-title">From <em>V=IR</em><br>to Humanoid Robotics</h1>
                    <p class="hero-subtitle">
                        Seven phases. Every resource curated, not collected.
                        Track your progress as you go.
                    </p>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <div class="hero-stat-value">${phasesData.length}</div>
                            <div class="hero-stat-label">Phases</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-value">${total}</div>
                            <div class="hero-stat-label">Resources</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-value">${toolCount}</div>
                            <div class="hero-stat-label">Tools</div>
                        </div>
                    </div>
                </section>

                ${progressHTML()}

                <nav class="phase-nav">${pillsHTML(0)}</nav>

                <div class="content-area">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-arrow-up"></i></div>
                        <div class="empty-state-title">Select a phase to begin</div>
                        <div class="empty-state-body">
                            Use the pills above or the Phases menu.<br>
                            Check items off as you complete them — progress saves automatically.
                        </div>
                    </div>

                    <div class="overview-grid">
                        ${phasesData.map(p => `
                            <div class="overview-card" onclick="showPhase(${p.id})">
                                <div class="overview-card-head" style="background:var(--phase-${p.id});">
                                    <span class="overview-card-num">${p.id}</span>
                                    <span class="overview-card-title">${p.shortTitle}</span>
                                </div>
                                <div class="overview-card-body">
                                    <p class="overview-card-desc">${p.description.slice(0, 110)}…</p>
                                    <div class="overview-card-meta">
                                        <span><i class="fas fa-tools"></i>&nbsp; ${p.tools.length} tools</span>
                                        <span><i class="fas fa-book"></i>&nbsp; ${p.resources.length} resources</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        updateProgress();
    }

    // ════════════════════════════════════════════════
    //  RENDER PHASE
    // ════════════════════════════════════════════════
    function renderPhase(id) {
        const p = phasesData.find(x => x.id === id);
        if (!p) return;

        const toolRows = p.tools.map((t, i) => resourceRowHTML(t, `ph${id}-tool-${i}`)).join('');
        const resRows  = p.resources.map((r, i) => resourceRowHTML(r, `ph${id}-res-${i}`)).join('');

        document.getElementById('mainContainer').innerHTML = `
            <div class="phase-content ph-${p.id}">
                ${progressHTML()}
                <nav class="phase-nav">${pillsHTML(id)}</nav>

                <div class="content-area">
                    <div class="phase-header">
                        <div class="phase-eyebrow">Phase ${p.id} of ${phasesData.length}</div>
                        <div class="phase-heading">
                            <div class="phase-num-box">${p.id}</div>
                            <h1 class="phase-title-text">${p.title}</h1>
                        </div>
                    </div>

                    <div class="phase-desc">${p.description}</div>

                    <div class="section-card">
                        <div class="section-head">
                            <div class="section-icon tools"><i class="fas fa-tools"></i></div>
                            <span class="section-label">Required Tools & Software</span>
                            <span class="section-count">${p.tools.length} items</span>
                        </div>
                        <div class="section-body">
                            <div class="resource-list">${toolRows}</div>
                        </div>
                    </div>

                    <div class="section-card">
                        <div class="section-head">
                            <div class="section-icon resources"><i class="fas fa-book-open"></i></div>
                            <span class="section-label">Learning Resources</span>
                            <span class="section-count">${p.resources.length} items</span>
                        </div>
                        <div class="section-body">
                            <div class="resource-list">${resRows}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        updateProgress();
    }

    // ════════════════════════════════════════════════
    //  ACTIVE PILL
    // ════════════════════════════════════════════════
    function updateActivePill() {
        document.querySelectorAll('.phase-pill').forEach(el => el.classList.remove('active'));
        if (currentPhase > 0) {
            document.querySelectorAll(`.phase-pill.ph-${currentPhase}`).forEach(el => el.classList.add('active'));
        }
    }

    // ════════════════════════════════════════════════
    //  PROGRESS
    // ════════════════════════════════════════════════
    function toggleCheck(itemId, el) {
        el.classList.toggle('checked');
        checkedItems[itemId] = el.classList.contains('checked') ? true : undefined;
        if (!checkedItems[itemId]) delete checkedItems[itemId];
        localStorage.setItem('roboticsProgress', JSON.stringify(checkedItems));
        updateProgress();
    }

    function updateProgress() {
        const total     = phasesData.reduce((a, p) => a + p.tools.length + p.resources.length, 0);
        const completed = Object.keys(checkedItems).length;
        const pct       = total ? Math.round((completed / total) * 100) : 0;
        const valEl     = document.getElementById('progressValue');
        const fillEl    = document.getElementById('progressFill');
        if (valEl)  valEl.textContent  = `${pct}%`;
        if (fillEl) fillEl.style.width = `${pct}%`;
    }

    // ════════════════════════════════════════════════
    //  KEYBOARD
    // ════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
        const max = phasesData.length;
        if (e.key === 'ArrowLeft'  && currentPhase > 1)   showPhase(currentPhase - 1);
        if (e.key === 'ArrowRight' && currentPhase < max)  showPhase(currentPhase + 1);
        if (e.key === 'Escape') {
            if (document.getElementById('megaMenu').classList.contains('open')) closeMegaMenu();
            else if (currentPhase > 0) showHome();
        }
    });
    </script>
</body>
</html>
