<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotics Mastery Portal | From Circuits to Humanoids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Luxury Progression Palette */
            --phase-1: #5A3966;
            --phase-2: #2D325A;
            --phase-3: #1E5478;
            --phase-4: #236B50;
            --phase-5: #C29B38;
            --phase-6: #BD5B2A;
            --phase-7: #9E1B22;
            
            /* Dark Mode (Default) */
            --bg-primary: #121212;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #242424;
            --bg-card: #1e1e1e;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --text-muted: #707070;
            --border-color: #333333;
            --glow-intensity: 0.3;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --hover-bg: rgba(255, 255, 255, 0.05);
        }
        
        [data-theme="light"] {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e9ecef;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a5a;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --glow-intensity: 0.15;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(0, 0, 0, 0.03);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }
        
        /* Header & Navigation */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--phase-1), var(--phase-3));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .nav-container {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .nav-item {
            position: relative;
        }
        
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .nav-link:hover {
            color: var(--text-primary);
            background: var(--hover-bg);
        }
        
        .nav-link.active {
            color: var(--text-primary);
        }
        
        /* Theme Toggle - Robot Eye Style */
        .theme-toggle {
            position: relative;
            width: 60px;
            height: 32px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 2px;
        }
        
        .theme-toggle:hover {
            border-color: var(--phase-3);
            box-shadow: 0 0 15px rgba(30, 84, 120, var(--glow-intensity));
        }
        
        [data-theme="dark"] .theme-toggle {
            box-shadow: 0 0 20px rgba(90, 57, 102, 0.4), inset 0 0 10px rgba(90, 57, 102, 0.2);
        }
        
        [data-theme="light"] .theme-toggle {
            box-shadow: 3px 3px 8px var(--shadow-color), -3px -3px 8px rgba(255, 255, 255, 0.8);
        }
        
        .theme-toggle-slider {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--phase-1), var(--phase-3));
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: white;
        }
        
        [data-theme="light"] .theme-toggle-slider {
            transform: translateX(28px);
            background: linear-gradient(135deg, var(--phase-5), var(--phase-6));
        }
        
        /* Mega Menu */
        .mega-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: 800px;
            max-width: 90vw;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 20px 60px var(--shadow-color);
            z-index: 999;
        }
        
        .nav-item:hover .mega-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        
        .mega-menu-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .mega-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        
        .mega-menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .mega-menu-item:hover {
            background: var(--hover-bg);
            transform: translateX(5px);
        }
        
        .mega-menu-item.phase-1:hover { border-color: var(--phase-1); box-shadow: 0 0 20px rgba(90, 57, 102, var(--glow-intensity)); }
        .mega-menu-item.phase-2:hover { border-color: var(--phase-2); box-shadow: 0 0 20px rgba(45, 50, 90, var(--glow-intensity)); }
        .mega-menu-item.phase-3:hover { border-color: var(--phase-3); box-shadow: 0 0 20px rgba(30, 84, 120, var(--glow-intensity)); }
        .mega-menu-item.phase-4:hover { border-color: var(--phase-4); box-shadow: 0 0 20px rgba(35, 107, 80, var(--glow-intensity)); }
        .mega-menu-item.phase-5:hover { border-color: var(--phase-5); box-shadow: 0 0 20px rgba(194, 155, 56, var(--glow-intensity)); }
        .mega-menu-item.phase-6:hover { border-color: var(--phase-6); box-shadow: 0 0 20px rgba(189, 91, 42, var(--glow-intensity)); }
        .mega-menu-item.phase-7:hover { border-color: var(--phase-7); box-shadow: 0 0 20px rgba(158, 27, 34, var(--glow-intensity)); }
        
        .mega-menu-number {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
        }
        
        .mega-menu-number.phase-1 { background: var(--phase-1); }
        .mega-menu-number.phase-2 { background: var(--phase-2); }
        .mega-menu-number.phase-3 { background: var(--phase-3); }
        .mega-menu-number.phase-4 { background: var(--phase-4); }
        .mega-menu-number.phase-5 { background: var(--phase-5); }
        .mega-menu-number.phase-6 { background: var(--phase-6); }
        .mega-menu-number.phase-7 { background: var(--phase-7); }
        
        .mega-menu-content {
            flex: 1;
        }
        
        .mega-menu-item-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        
        .mega-menu-item-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }
        
        /* Main Content */
        .main-container {
            margin-top: 70px;
            min-height: calc(100vh - 70px);
            position: relative;
        }
        
        /* Hero Section */
        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-bottom: 1px solid var(--border-color);
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        
        .hero-badge i {
            color: var(--phase-5);
        }
        
        .hero-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--phase-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }
        
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        
        .hero-stat {
            text-align: center;
        }
        
        .hero-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--phase-3);
        }
        
        .hero-stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Phase Navigation Pills */
        .phase-nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem 2rem;
            flex-wrap: wrap;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 70px;
            z-index: 100;
        }
        
        .phase-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
        }
        
        .phase-pill:hover {
            transform: translateY(-2px);
        }
        
        .phase-pill.active {
            color: white;
            border-color: transparent;
        }
        
        .phase-pill.active.phase-1 { background: var(--phase-1); }
        .phase-pill.active.phase-2 { background: var(--phase-2); }
        .phase-pill.active.phase-3 { background: var(--phase-3); }
        .phase-pill.active.phase-4 { background: var(--phase-4); }
        .phase-pill.active.phase-5 { background: var(--phase-5); }
        .phase-pill.active.phase-6 { background: var(--phase-6); }
        .phase-pill.active.phase-7 { background: var(--phase-7); }
        
        .phase-pill-number {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }
        
        .phase-pill.active .phase-pill-number {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        /* Content Area */
        .content-area {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Phase Content */
        .phase-content {
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeOutDown {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(20px);
            }
        }
        
        .phase-content.exiting {
            animation: fadeOutDown 0.3s ease forwards;
        }
        
        .phase-header {
            margin-bottom: 2rem;
        }
        
        .phase-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .phase-title-number {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.25rem;
            color: white;
        }
        
        .phase-title-number.phase-1 { background: var(--phase-1); box-shadow: 0 0 30px rgba(90, 57, 102, var(--glow-intensity)); }
        .phase-title-number.phase-2 { background: var(--phase-2); box-shadow: 0 0 30px rgba(45, 50, 90, var(--glow-intensity)); }
        .phase-title-number.phase-3 { background: var(--phase-3); box-shadow: 0 0 30px rgba(30, 84, 120, var(--glow-intensity)); }
        .phase-title-number.phase-4 { background: var(--phase-4); box-shadow: 0 0 30px rgba(35, 107, 80, var(--glow-intensity)); }
        .phase-title-number.phase-5 { background: var(--phase-5); box-shadow: 0 0 30px rgba(194, 155, 56, var(--glow-intensity)); }
        .phase-title-number.phase-6 { background: var(--phase-6); box-shadow: 0 0 30px rgba(189, 91, 42, var(--glow-intensity)); }
        .phase-title-number.phase-7 { background: var(--phase-7); box-shadow: 0 0 30px rgba(158, 27, 34, var(--glow-intensity)); }
        
        .phase-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        
        /* Section Cards */
        .section-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        
        .section-header {
            padding: 1.25rem 1.5rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .section-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
        }
        
        .section-icon.tools { background: var(--phase-3); }
        .section-icon.resources { background: var(--phase-5); }
        
        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .section-body {
            padding: 1rem;
        }
        
        /* Resource Items */
        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .resource-item:hover {
            background: var(--hover-bg);
            border-color: var(--border-color);
        }
        
        .resource-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .resource-checkbox:hover {
            border-color: var(--phase-4);
        }
        
        .resource-checkbox.checked {
            background: var(--phase-4);
            border-color: var(--phase-4);
        }
        
        .resource-checkbox.checked i {
            color: white;
            font-size: 0.75rem;
        }
        
        .resource-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .resource-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .resource-link:hover {
            color: var(--phase-3);
        }
        
        /* Resource Tags */
        .resource-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        
        .resource-tag.video {
            background: rgba(189, 91, 42, 0.15);
            color: var(--phase-6);
            border: 1px solid rgba(189, 91, 42, 0.3);
        }
        
        .resource-tag.course {
            background: rgba(30, 84, 120, 0.15);
            color: var(--phase-3);
            border: 1px solid rgba(30, 84, 120, 0.3);
        }
        
        .resource-tag.github {
            background: rgba(90, 57, 102, 0.15);
            color: var(--phase-1);
            border: 1px solid rgba(90, 57, 102, 0.3);
        }
        
        .resource-tag.tool {
            background: rgba(35, 107, 80, 0.15);
            color: var(--phase-4);
            border: 1px solid rgba(35, 107, 80, 0.3);
        }
        
        .resource-tag.website {
            background: rgba(45, 50, 90, 0.15);
            color: #6b7cb3;
            border: 1px solid rgba(45, 50, 90, 0.3);
        }
        
        .resource-tag.hardware {
            background: rgba(194, 155, 56, 0.15);
            color: var(--phase-5);
            border: 1px solid rgba(194, 155, 56, 0.3);
        }
        
        .resource-tag.pdf {
            background: rgba(158, 27, 34, 0.15);
            color: var(--phase-7);
            border: 1px solid rgba(158, 27, 34, 0.3);
        }
        
        .resource-tag.software {
            background: rgba(30, 84, 120, 0.15);
            color: var(--phase-3);
            border: 1px solid rgba(30, 84, 120, 0.3);
        }
        
        /* Progress Bar */
        .progress-section {
            padding: 1.5rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .progress-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .progress-title {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .progress-value {
            font-weight: 700;
            color: var(--phase-4);
        }
        
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--phase-4), var(--phase-3));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        /* Footer */
        .footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
            margin-top: 3rem;
        }
        
        .footer-text {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .footer-heart {
            color: var(--phase-7);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
            }
            
            .nav-container {
                gap: 1rem;
            }
            
            .mega-menu {
                width: 95vw;
                left: 2.5%;
                transform: translateY(-10px);
            }
            
            .nav-item:hover .mega-menu {
                transform: translateY(0);
            }
            
            .mega-menu-grid {
                grid-template-columns: 1fr;
            }
            
            .hero-stats {
                gap: 1.5rem;
            }
            
            .phase-nav {
                padding: 1rem;
                gap: 0.4rem;
            }
            
            .phase-pill {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }
            
            .phase-pill-text {
                display: none;
            }
            
            .content-area {
                padding: 1rem;
            }
            
            .phase-title {
                font-size: 1.5rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .resource-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Selection */
        ::selection {
            background: var(--phase-3);
            color: white;
        }
    </style>
</head>
<body data-theme="dark">
    <!-- Header -->
    <header class="header">
        <a href="#" class="logo" onclick="showHome()">
            <div class="logo-icon">
                <i class="fas fa-robot"></i>
            </div>
            <span>Robotics Mastery</span>
        </a>

                                <div class="resource-list">
                                    ${phase.resources.map((resource, index) => {
                                        const itemId = `phase${phaseId}-resource-${index}`;
                                        const isChecked = checkedItems[itemId] ? 'checked' : '';
                                        return `
                                            <div class="resource-item">
                                                <div class="resource-checkbox ${isChecked}" onclick="toggleCheck('${itemId}', this)">
                                                    <i class="fas fa-check"></i>
                                                </div>
                                                <div class="resource-content">
                                                    <span class="resource-tag ${resource.tagClass}">
                                                        <i class="fas ${resource.icon}"></i>
                                                        ${resource.tag}
                                                    </span>
                                                    <a href="${resource.url}" target="_blank" rel="noopener noreferrer" class="resource-link">
                                                        ${resource.name}
                                                        <i class="fas fa-external-link-alt" style="font-size: 0.75rem; margin-left: 0.25rem;"></i>
                                                    </a>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            updateProgress();
        }

        function updateActivePill() {
            document.querySelectorAll('.phase-pill').forEach(pill => {
                pill.classList.remove('active');
            });
            if (currentPhase > 0) {
                document.querySelectorAll(`.phase-pill.phase-${currentPhase}`).forEach(pill => {
                    pill.classList.add('active');
                });
            }
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function toggleCheck(itemId, checkboxElement) {
            checkboxElement.classList.toggle('checked');
            
            if (checkboxElement.classList.contains('checked')) {
                checkedItems[itemId] = true;
            } else {
                delete checkedItems[itemId];
            }
            
            localStorage.setItem('roboticsProgress', JSON.stringify(checkedItems));
            updateProgress();
        }

        function updateProgress() {
            const totalItems = phasesData.reduce((acc, phase) => {
                return acc + phase.tools.length + phase.resources.length;
            }, 0);
            
            const completedItems = Object.keys(checkedItems).length;
            const percentage = Math.round((completedItems / totalItems) * 100);
            
            const progressValue = document.getElementById('progressValue');
            const progressFill = document.getElementById('progressFill');
            
            if (progressValue && progressFill) {
                progressValue.textContent = `${percentage}%`;
                progressFill.style.width = `${percentage}%`;
            }
        }

        // ============================================
        // KEYBOARD NAVIGATION
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentPhase > 1) {
                showPhase(currentPhase - 1);
            } else if (e.key === 'ArrowRight' && currentPhase < 7) {
                showPhase(currentPhase + 1);
            } else if (e.key === 'Escape' && currentPhase > 0) {
                showHome();
            }
        });
    </script>
</body>
</html>
