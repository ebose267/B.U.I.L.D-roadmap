<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alix Robotics Mastery Roadmap | From Circuits to Humanoids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --phase-1: #6B3FA0;
            --phase-2: #2B4A8C;
            --phase-3: #1A6E8C;
            --phase-4: #1A7A52;
            --phase-5: #B8891A;
            --phase-6: #C04A1E;
            --phase-7: #A01828;

            --bg-base:      #0C0C0F;
            --bg-surface:   #131318;
            --bg-raised:    #1A1A22;
            --bg-card:      #1E1E28;
            --bg-hover:     rgba(255,255,255,0.04);
            --text-1:       #EEEEF2;
            --text-2:       #9999AA;
            --text-3:       #55556A;
            --border:       rgba(255,255,255,0.08);
            --border-mid:   rgba(255,255,255,0.12);
            --grid-color:   rgba(255,255,255,0.035);
            --shadow:       rgba(0,0,0,0.6);
            --accent:       #5B8CFF;
            --accent-dim:   rgba(91,140,255,0.15);

            --font-display: 'Outfit', sans-serif;
            --font-body:    'Lora', Georgia, serif;
            --font-mono:    'DM Mono', 'JetBrains Mono', monospace;
        }

        [data-theme="light"] {
            --bg-base:      #F4F4F7;
            --bg-surface:   #FFFFFF;
            --bg-raised:    #EBEBF0;
            --bg-card:      #FFFFFF;
            --bg-hover:     rgba(0,0,0,0.03);
            --text-1:       #12121A;
            --text-2:       #4A4A60;
            --text-3:       #9090A8;
            --border:       rgba(0,0,0,0.08);
            --border-mid:   rgba(0,0,0,0.12);
            --grid-color:   rgba(0,0,0,0.05);
            --shadow:       rgba(0,0,0,0.12);
            --accent:       #2D5FD4;
            --accent-dim:   rgba(45,95,212,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            color: var(--text-1);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, transparent 40%, var(--bg-base) 100%);
            pointer-events: none;
            z-index: 0;
        }

        header, main, footer, .phase-nav { position: relative; z-index: 1; }

        /* ─── HEADER ─── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 66px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            height: 34px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(91,140,255,0.25));
            transition: filter 0.3s;
        }

        .logo:hover .logo-img { filter: drop-shadow(0 0 14px rgba(91,140,255,0.5)); }

        .logo-divider {
            width: 1px;
            height: 20px;
            background: var(--border-mid);
            margin: 0 0.2rem;
        }

        .logo-sub {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-item { position: relative; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--text-2);
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--text-1);
            background: var(--bg-hover);
            border-color: var(--border);
        }

        .nav-link i.chevron {
            font-size: 0.6rem;
            transition: transform 0.2s;
        }

        .nav-item:hover .nav-link .chevron,
        .nav-link.menu-open .chevron { transform: rotate(180deg); }

        .theme-toggle {
            width: 52px; height: 28px;
            background: var(--bg-raised);
            border: 1px solid var(--border-mid);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .toggle-knob {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--phase-1), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: white;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        [data-theme="light"] .toggle-knob {
            transform: translateX(24px);
            background: linear-gradient(135deg, var(--phase-5), var(--phase-6));
        }

        /* ─── MEGA MENU ─── */
        .mega-menu {
            position: fixed;
            top: 74px;
            right: 1rem;
            left: auto;
            transform: translateY(-6px);
            width: min(680px, calc(100vw - 2rem));
            background: var(--bg-surface);
            border: 1px solid var(--border-mid);
            border-radius: 14px;
            padding: 1.25rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
            box-shadow: 0 24px 64px var(--shadow);
            z-index: 1001;
            max-height: calc(100vh - 90px);
            overflow-y: auto;
        }

        .mega-menu.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .mega-menu-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 0.85rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        .mega-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
        }

        .mega-menu-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            border: 1px solid transparent;
        }

        .mega-menu-item:hover { background: var(--bg-hover); }
        .mega-menu-item.ph-1:hover { border-color: rgba(107,63,160,0.35); }
        .mega-menu-item.ph-2:hover { border-color: rgba(43,74,140,0.35); }
        .mega-menu-item.ph-3:hover { border-color: rgba(26,110,140,0.35); }
        .mega-menu-item.ph-4:hover { border-color: rgba(26,122,82,0.35); }
        .mega-menu-item.ph-5:hover { border-color: rgba(184,137,26,0.35); }
        .mega-menu-item.ph-6:hover { border-color: rgba(192,74,30,0.35); }
        .mega-menu-item.ph-7:hover { border-color: rgba(160,24,40,0.35); }

        .menu-badge {
            width: 30px; height: 30px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.8rem;
            color: white;
            flex-shrink: 0;
        }

        .ph-1 .menu-badge { background: var(--phase-1); }
        .ph-2 .menu-badge { background: var(--phase-2); }
        .ph-3 .menu-badge { background: var(--phase-3); }
        .ph-4 .menu-badge { background: var(--phase-4); }
        .ph-5 .menu-badge { background: var(--phase-5); }
        .ph-6 .menu-badge { background: var(--phase-6); }
        .ph-7 .menu-badge { background: var(--phase-7); }

        .menu-text-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-1);
            line-height: 1.3;
        }

        .menu-text-sub {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-3);
            letter-spacing: 0.05em;
        }

        /* ─── MAIN ─── */
        .main-container {
            margin-top: 66px;
            min-height: calc(100vh - 66px);
        }

        /* ─── HERO ─── */
        .hero {
            padding: 5rem 2rem 4rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--bg-surface) 0%, transparent 100%);
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.9rem;
            background: var(--bg-raised);
            border: 1px solid var(--border-mid);
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 1.75rem;
        }

        .hero-eyebrow span.dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--phase-5);
            display: inline-block;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5.5vw, 4rem);
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -0.03em;
            color: var(--text-1);
            margin-bottom: 1.25rem;
        }

        .hero-title em {
            font-style: normal;
            background: linear-gradient(135deg, var(--accent) 0%, var(--phase-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-style: italic;
            color: var(--text-2);
            max-width: 520px;
            margin: 0 auto 2.5rem;
            line-height: 1.75;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .hero-stat-value {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .hero-stat-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-top: 0.3rem;
        }

        /* ─── PROGRESS BAR ─── */
        .progress-strip {
            padding: 1rem 2rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }

        .progress-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .progress-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            white-space: nowrap;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: var(--bg-raised);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--phase-4), var(--accent));
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-pct {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--phase-4);
            white-space: nowrap;
            min-width: 2.8rem;
            text-align: right;
        }

        /* ─── PHASE NAV ─── */
        .phase-nav {
            display: flex;
            justify-content: center;
            gap: 0.35rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 66px;
            z-index: 100;
        }

        .phase-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.85rem;
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            color: var(--text-2);
            background: var(--bg-card);
        }

        .phase-pill:hover { transform: translateY(-2px); border-color: var(--border-mid); }

        .pill-num {
            width: 18px; height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-raised);
            color: var(--text-3);
            transition: background 0.2s, color 0.2s;
        }

        .phase-pill.active { color: white; border-color: transparent; }
        .phase-pill.active .pill-num { background: rgba(255,255,255,0.2); color: white; }

        .phase-pill.active.ph-1 { background: var(--phase-1); }
        .phase-pill.active.ph-2 { background: var(--phase-2); }
        .phase-pill.active.ph-3 { background: var(--phase-3); }
        .phase-pill.active.ph-4 { background: var(--phase-4); }
        .phase-pill.active.ph-5 { background: var(--phase-5); }
        .phase-pill.active.ph-6 { background: var(--phase-6); }
        .phase-pill.active.ph-7 { background: var(--phase-7); }

        /* ─── CONTENT ─── */
        .content-area {
            padding: 2.5rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .phase-content { animation: rise 0.4s cubic-bezier(0.16,1,0.3,1); }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fall {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(12px); }
        }

        .phase-content.exiting { animation: fall 0.25s ease forwards; }

        /* Phase header */
        .phase-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 0.5rem;
        }

        .phase-heading {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .phase-num-box {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
        }

        .ph-1 .phase-num-box { background: var(--phase-1); box-shadow: 0 0 24px rgba(107,63,160,0.3); }
        .ph-2 .phase-num-box { background: var(--phase-2); box-shadow: 0 0 24px rgba(43,74,140,0.3); }
        .ph-3 .phase-num-box { background: var(--phase-3); box-shadow: 0 0 24px rgba(26,110,140,0.3); }
        .ph-4 .phase-num-box { background: var(--phase-4); box-shadow: 0 0 24px rgba(26,122,82,0.3); }
        .ph-5 .phase-num-box { background: var(--phase-5); box-shadow: 0 0 24px rgba(184,137,26,0.3); }
        .ph-6 .phase-num-box { background: var(--phase-6); box-shadow: 0 0 24px rgba(192,74,30,0.3); }
        .ph-7 .phase-num-box { background: var(--phase-7); box-shadow: 0 0 24px rgba(160,24,40,0.3); }

        .phase-title-text {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-1);
            line-height: 1.15;
        }

        /* Phase summary strip */
        .phase-summary-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .summary-chip {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .summary-chip-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        .summary-chip-value {
            font-family: var(--font-display);
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-1);
        }

        /* Phase completion outcome */
        .completion-banner {
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.75rem;
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
        }

        .completion-banner-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: var(--bg-raised);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .completion-banner-text {
            font-family: var(--font-body);
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--text-2);
        }

        .completion-banner-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text-1);
            margin-bottom: 0.25rem;
            letter-spacing: 0.01em;
        }

        .phase-desc {
            font-family: var(--font-body);
            font-size: 0.97rem;
            line-height: 1.8;
            color: var(--text-2);
            padding: 1.25rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.75rem;
        }

        /* ─── SECTION CARDS ─── */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--bg-raised);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .section-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            color: white;
            flex-shrink: 0;
        }

        .section-icon.tools      { background: var(--phase-3); }
        .section-icon.resources  { background: var(--phase-5); }
        .section-icon.project    { background: var(--phase-6); }
        .section-icon.proof      { background: var(--phase-4); }
        .section-icon.career     { background: var(--phase-2); }
        .section-icon.mistakes   { background: var(--phase-7); }

        .section-label {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-1);
        }

        .section-count {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-3);
            letter-spacing: 0.1em;
        }

        .section-toggle {
            font-size: 0.65rem;
            color: var(--text-3);
            margin-left: 0.5rem;
            transition: transform 0.2s;
        }

        .section-card.collapsed .section-toggle { transform: rotate(-90deg); }
        .section-card.collapsed .section-body { display: none; }

        .section-body { padding: 0.75rem; }

        /* ─── RESOURCE ROWS ─── */
        .resource-list { display: flex; flex-direction: column; gap: 0.25rem; }

        .resource-row {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 0.85rem;
            border-radius: 8px;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .resource-row:hover {
            background: var(--bg-hover);
            border-color: var(--border);
        }

        .check-box {
            width: 20px; height: 20px;
            border: 1.5px solid var(--border-mid);
            border-radius: 5px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .check-box:hover { border-color: var(--phase-4); }

        .check-box i {
            opacity: 0;
            font-size: 0.65rem;
            color: white;
            transition: opacity 0.15s;
        }

        .check-box.checked {
            background: var(--phase-4);
            border-color: var(--phase-4);
        }

        .check-box.checked i { opacity: 1; }

        .res-tag {

            color: var(--phase-4);

        .project-dod-text {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--text-2);
            line-height: 1.6;

        .project-stretch {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--border);
            background: var(--bg-raised);

            font-family: var(--font-mono);
            font-size: 0.6rem;

            font-family: var(--font-body);
            font-size: 0.83rem;
            color: var(--text-2);
            line-height: 1.6;

        .proof-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.6rem;
            padding: 0.75rem;

            display: flex;
            align-items: center;
            gap: 0.65rem;

            color: var(--phase-4);

            font-family: var(--font-body);
            font-size: 0.82rem;

        .career-tag:hover {

        .career-tag i {
            font-size: 0.6rem;
            color: var(--text-3);

        @media (max-width: 1024px) {
            .mega-menu {
                right: 0.75rem;
                width: min(620px, calc(100vw - 1.5rem));
            }
        }

        @media (max-width: 768px) {
            .header { padding: 0 1rem; }
            .nav-container { gap: 0.75rem; }
            .logo-divider, .logo-sub { display: none; }

                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                border-radius: 18px 18px 0 0;
                border-bottom: none;
                transform: translateY(10px);
                max-height: 75vh;
                overflow-y: auto;
                padding: 1.5rem 1rem 2rem;
            }

            .mega-menu::before {
                content: '';
                display: block;
                width: 36px;
                height: 4px;
                background: var(--border-mid);
                border-radius: 2px;
                margin: 0 auto 1.1rem;
            }

            .mega-menu.open { transform: translateY(0); }

            .mega-menu-grid { grid-template-columns: 1fr; }
            .phase-nav { padding: 0.75rem 1rem; }
            .phase-pill .pill-text { display: none; }

            .content-area { padding: 1.25rem 1rem; }
            .phase-title-text { font-size: 1.3rem; }
            .hero { padding: 3rem 1.25rem 2.5rem; }
            .hero-stats { gap: 1.5rem; }
            .hero-stat-value { font-size: 1.75rem; }
            .phase-summary-strip { grid-template-columns: 1fr; }
            .project-grid { grid-template-columns: 1fr; }
            .project-cell { border-right: none !important; }
            .proof-grid { grid-template-columns: 1fr 1fr; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
        ::selection { background: var(--accent); color: white; }

    // ════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════
    let currentPhase  = 0;
    let checkedItems  = {};
    let pendingRender = null;

    // ════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
        checkedItems = JSON.parse(localStorage.getItem('roboticsProgress') || '{}');
        const saved = localStorage.getItem('theme') || 'dark';
        applyTheme(saved);
        initMegaMenu();
        showHome();
    });

    // ════════════════════════════════════════════════
    //  THEME
    // ════════════════════════════════════════════════
    function applyTheme(t) {
        document.body.setAttribute('data-theme', t);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.className = t === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    }

    function toggleTheme() {
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
    }

    // ════════════════════════════════════════════════
    //  MEGA MENU
    // ════════════════════════════════════════════════
    function initMegaMenu() {
        document.getElementById('megaMenuGrid').innerHTML = phasesData.map(p => `
            <div class="mega-menu-item ph-${p.id}" onclick="showPhase(${p.id}); closeMegaMenu();">
                <div class="menu-badge">${p.id}</div>
                <div>
                    <div class="menu-text-title">${p.shortTitle}</div>
                    <div class="menu-text-sub">Phase ${p.id} &nbsp;·&nbsp; ${p.skillLevel}</div>
                </div>
            </div>
        `).join('');
    }

    function toggleMegaMenu(e) {
        e.stopPropagation();
        const m = document.getElementById('megaMenu');
        const btn = document.getElementById('phasesNavBtn');
        const bd = document.getElementById('megaMenuBackdrop');
        const isOpen = m.classList.contains('open');
        if (isOpen) {
            closeMegaMenu();
        } else {
            m.classList.add('open');
            btn.classList.add('menu-open');
            if (bd) bd.style.display = 'block';
        }
    }

    function closeMegaMenu() {
        document.getElementById('megaMenu').classList.remove('open');
        document.getElementById('phasesNavBtn').classList.remove('menu-open');
        const bd = document.getElementById('megaMenuBackdrop');
        if (bd) bd.style.display = 'none';
    }

    document.addEventListener('click', e => {
        const menu = document.getElementById('megaMenu');
        if (menu && menu.classList.contains('open') && !e.target.closest('.nav-item') && !e.target.closest('.mega-menu')) {
            closeMegaMenu();
        }
    });

    // ════════════════════════════════════════════════
    //  SECTION COLLAPSE
    // ════════════════════════════════════════════════
    function toggleSection(el) {
        el.closest('.section-card').classList.toggle('collapsed');
    }

    // ════════════════════════════════════════════════
    //  NAVIGATION
    // ════════════════════════════════════════════════
    function showHome() {
        currentPhase = 0;
        if (pendingRender) { clearTimeout(pendingRender); pendingRender = null; }
        renderHome();
        updateActivePill();
    }

    function showPhase(id) {
        if (currentPhase === id) return;
        currentPhase = id;
        if (pendingRender) { clearTimeout(pendingRender); pendingRender = null; }
        const container = document.getElementById('mainContainer');
        const existing  = container.querySelector('.phase-content');
        if (existing) {
            existing.classList.add('exiting');
            const target = id;
            pendingRender = setTimeout(() => {
                pendingRender = null;
                renderPhase(target);
                updateActivePill();
            }, 250);
        } else {
            renderPhase(id);
            updateActivePill();
        }
    }

    // ════════════════════════════════════════════════
    //  RENDER HELPERS
    // ════════════════════════════════════════════════
    function pillsHTML(activeId) {
        return phasesData.map(p => `
            <div class="phase-pill ph-${p.id} ${p.id === activeId ? 'active' : ''}" onclick="showPhase(${p.id})">
                <span class="pill-num">${p.id}</span>
                <span class="pill-text">${p.shortTitle}</span>
            </div>
        `).join('');
    }

    function progressHTML() {
        return `
            <div class="progress-strip">
                <div class="progress-inner">
                    <span class="progress-label">Progress</span>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <span class="progress-pct" id="progressValue">0%</span>
                </div>
            </div>
        `;
    }

    function resourceRowHTML(item, itemId) {
        const checked = checkedItems[itemId] ? 'checked' : '';
        return `
            <div class="resource-row">
                <div class="check-box ${checked}" onclick="toggleCheck('${itemId}', this)">
                    <i class="fas fa-check"></i>
                </div>
                <span class="res-tag ${item.tagClass}">
                    <i class="fas ${item.icon}"></i> ${item.tag}
                </span>
                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="res-link">
                    ${item.name}<i class="fas fa-arrow-up-right-from-square res-link-icon"></i>
                </a>
            </div>
        `;
    }

    function sectionCardHTML(iconClass, iconType, label, count, bodyHTML, defaultCollapsed) {
        const collapsedClass = defaultCollapsed ? 'collapsed' : '';
        return `
            <div class="section-card ${collapsedClass}">
                <div class="section-head" onclick="toggleSection(this)">
                    <div class="section-icon ${iconClass}"><i class="fas ${iconType}"></i></div>
                    <span class="section-label">${label}</span>
                    <span class="section-count">${count}</span>
                    <i class="fas fa-chevron-down section-toggle"></i>
                </div>
                <div class="section-body">${bodyHTML}</div>
            </div>
        `;
    }

    function checkpointProjectHTML(proj, phaseId) {
        const skills = proj.requiredSkills.map(s => `<li>${s}</li>`).join('');
        const tools  = proj.suggestedTools.map(t => `<li>${t}</li>`).join('');
        const delivs = proj.deliverables.map(d => `<li>${d}</li>`).join('');

        return `
            <div class="project-card">
                <div class="project-header">
                    <div class="project-num">CP</div>
                    <div>
                        <div class="project-title">${proj.title}</div>
                        <div class="project-objective">${proj.objective}</div>
                    </div>
                </div>
                <div class="project-grid">
                    <div class="project-cell">
                        <div class="project-cell-label">Required Skills</div>
                        <div class="project-cell-content"><ul>${skills}</ul></div>
                    </div>
                    <div class="project-cell">
                        <div class="project-cell-label">Suggested Tools</div>
                        <div class="project-cell-content"><ul>${tools}</ul></div>
                    </div>
                    <div class="project-cell" style="grid-column: 1 / -1;">
                        <div class="project-cell-label">Deliverables</div>
                        <div class="project-cell-content"><ul>${delivs}</ul></div>
                    </div>
                </div>
                <div class="project-dod">
                    <span class="project-dod-label">Done when</span>
                    <span class="project-dod-text">${proj.definitionOfDone}</span>
                </div>
                <div class="project-stretch">
                    <div class="project-stretch-label">⚡ Stretch goal</div>
                    <div class="project-stretch-content">${proj.stretchGoal}</div>
                </div>
            </div>
        `;
    }

    function proofOfWorkHTML(proofs) {
        return `
            <div class="proof-grid">
                ${proofs.map(p => `
                    <div class="proof-item">
                        <div class="proof-item-icon"><i class="fab ${p.icon}" onerror="this.className='fas fa-check'"></i></div>
                        <div class="proof-item-text">${p.text}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function careerHTML(careers) {
        const icons = {
            'Hardware Engineer': 'fa-microchip',
            'PCB Designer': 'fa-drafting-compass',
            'Embedded Systems Engineer': 'fa-code',
            'Firmware Engineer': 'fa-file-code',
            'IoT Developer': 'fa-wifi',
            'Robotics Engineer': 'fa-robot',
            'Autonomous Systems Engineer': 'fa-car',
            'Control Systems Engineer': 'fa-sliders-h',
            'Drone Systems Engineer': 'fa-helicopter',
            'Edge AI Engineer': 'fa-brain',
            'Test & Validation Engineer': 'fa-vial',
            'Power Electronics Engineer': 'fa-bolt',
        };
        return `
            <div class="career-grid">
                ${careers.map(c => `
                    <div class="career-tag">
                        <i class="fas ${icons[c] || 'fa-arrow-right'}"></i>
                        ${c}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function mistakesHTML(mistakes) {
        return `
            <div class="mistake-list">
                ${mistakes.map(m => `
                    <div class="mistake-item">
                        <div class="mistake-icon"><i class="fas fa-times"></i></div>
                        <div class="mistake-text">${m}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // ════════════════════════════════════════════════
    //  RENDER HOME
    // ════════════════════════════════════════════════
    function renderHome() {
        const totalRes   = phasesData.reduce((a, p) => a + p.resources.length, 0);
        const toolCount  = phasesData.reduce((a, p) => a + p.tools.length, 0);

        document.getElementById('mainContainer').innerHTML = `
            <div class="phase-content">
                <section class="hero">
                    <div class="hero-eyebrow">
                        <span class="dot"></span>
                        Project B.U.I.L.D. &nbsp;·&nbsp; Complete Roadmap
                    </div>
                    <h1 class="hero-title">From <em>V=IR</em><br>to Humanoid Robotics</h1>
                    <p class="hero-subtitle">
                        Seven phases. Checkpoint projects. Proof of work. Career outcomes.
                        Built for engineers who ship.
                    </p>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <div class="hero-stat-value">${phasesData.length}</div>
                            <div class="hero-stat-label">Phases</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-value">${phasesData.length}</div>
                            <div class="hero-stat-label">Projects</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-value">${totalRes}</div>
                            <div class="hero-stat-label">Resources</div>
                        </div>
                        <div class="hero-stat">
                            <div class="hero-stat-value">${toolCount}</div>
                            <div class="hero-stat-label">Tools</div>
                        </div>
                    </div>
                </section>

                ${progressHTML()}

                <nav class="phase-nav">${pillsHTML(0)}</nav>

                <div class="content-area">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-arrow-up"></i></div>
                        <div class="empty-state-title">Select a phase to begin</div>
                        <div class="empty-state-body">
                            Use the pills above or the Phases menu.<br>
                            Check resources off as you complete them — progress saves automatically.
                        </div>
                    </div>

                    <div class="overview-grid">
                        ${phasesData.map(p => `
                            <div class="overview-card" onclick="showPhase(${p.id})">
                                <div class="overview-card-head" style="background:var(--phase-${p.id});">
                                    <span class="overview-card-num">${p.id}</span>
                                    <div>
                                        <div class="overview-card-title">${p.shortTitle}</div>
                                    </div>
                                </div>
                                <div class="overview-card-body">
                                    <p class="overview-card-desc">${p.description.slice(0, 120)}…</p>
                                    <div class="overview-card-meta">
                                        <span><i class="fas fa-tools"></i>&nbsp; ${p.tools.length} tools</span>
                                        <span><i class="fas fa-book"></i>&nbsp; ${p.resources.length} resources</span>
                                        <span><i class="fas fa-layer-group"></i>&nbsp; ${p.skillLevel}</span>
                                    </div>
                                    <div class="overview-card-project">
                                        <i class="fas fa-flag-checkered"></i>&nbsp;
                                        <span>${p.checkpointProject.title}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        updateProgress();
    }

    // ════════════════════════════════════════════════
    //  RENDER PHASE
    // ════════════════════════════════════════════════
    function renderPhase(id) {
        const p = phasesData.find(x => x.id === id);
        if (!p) return;

        const toolRows = p.tools.map((t, i) => resourceRowHTML(t, `ph${id}-tool-${i}`)).join('');
        const resRows  = p.resources.map((r, i) => resourceRowHTML(r, `ph${id}-res-${i}`)).join('');

        document.getElementById('mainContainer').innerHTML = `
            <div class="phase-content ph-${p.id}">
                ${progressHTML()}
                <nav class="phase-nav">${pillsHTML(id)}</nav>

                <div class="content-area">
                    <div class="phase-header" style="margin-bottom: 1.25rem;">
                        <div class="phase-eyebrow">Phase ${p.id} of ${phasesData.length} &nbsp;·&nbsp; ${p.skillLevel}</div>
                        <div class="phase-heading">
                            <div class="phase-num-box">${p.id}</div>
                            <h1 class="phase-title-text">${p.title}</h1>
                        </div>
                    </div>

                    <div class="phase-summary-strip">
                        <div class="summary-chip">
                            <div class="summary-chip-label">Level</div>
                            <div class="summary-chip-value">${p.skillLevel}</div>
                        </div>
                        <div class="summary-chip">
                            <div class="summary-chip-label">Resources</div>
                            <div class="summary-chip-value">${p.tools.length + p.resources.length} items</div>
                        </div>
                        <div class="summary-chip">
                            <div class="summary-chip-label">Career paths</div>
                            <div class="summary-chip-value">${p.careerOutcomes.length} roles</div>
                        </div>
                    </div>

                    <div class="phase-desc">${p.description}</div>

                    <div class="completion-banner">
                        <div class="completion-banner-icon">🎯</div>
                        <div>
                            <div class="completion-banner-title">What you become after this phase</div>
                            <div class="completion-banner-text">${p.completionOutcome}</div>
                        </div>
                    </div>

                    ${sectionCardHTML('tools', 'fa-tools', 'Required Tools & Software', `${p.tools.length} items`, `<div class="resource-list">${toolRows}</div>`, false)}
                    ${sectionCardHTML('resources', 'fa-book-open', 'Learning Resources', `${p.resources.length} items`, `<div class="resource-list">${resRows}</div>`, false)}
                    ${sectionCardHTML('project', 'fa-flag-checkered', 'Checkpoint Project', 'Required', checkpointProjectHTML(p.checkpointProject, p.id), false)}
                    ${sectionCardHTML('proof', 'fa-upload', 'Proof of Work', `${p.proofOfWork.length} items`, proofOfWorkHTML(p.proofOfWork), false)}
                    ${sectionCardHTML('career', 'fa-briefcase', 'Career Outcomes', `${p.careerOutcomes.length} roles`, careerHTML(p.careerOutcomes), false)}
                    ${sectionCardHTML('mistakes', 'fa-exclamation-triangle', 'Common Mistakes to Avoid', `${p.mistakesToAvoid.length}`, mistakesHTML(p.mistakesToAvoid), true)}

                </div>
            </div>
        `;
        updateProgress();
    }

    // ════════════════════════════════════════════════
    //  ACTIVE PILL
    // ════════════════════════════════════════════════
    function updateActivePill() {
        document.querySelectorAll('.phase-pill').forEach(el => el.classList.remove('active'));
        if (currentPhase > 0) {
            document.querySelectorAll(`.phase-pill.ph-${currentPhase}`).forEach(el => el.classList.add('active'));
        }
    }

    // ════════════════════════════════════════════════
    //  PROGRESS
    // ════════════════════════════════════════════════
    function toggleCheck(itemId, el) {
        el.classList.toggle('checked');
        checkedItems[itemId] = el.classList.contains('checked') ? true : undefined;
        if (!checkedItems[itemId]) delete checkedItems[itemId];
        localStorage.setItem('roboticsProgress', JSON.stringify(checkedItems));
        updateProgress();
    }

    function updateProgress() {
        const total     = phasesData.reduce((a, p) => a + p.tools.length + p.resources.length, 0);
        const completed = Object.keys(checkedItems).length;
        const pct       = total ? Math.round((completed / total) * 100) : 0;
        const valEl     = document.getElementById('progressValue');
        const fillEl    = document.getElementById('progressFill');
        if (valEl)  valEl.textContent  = `${pct}%`;
        if (fillEl) fillEl.style.width = `${pct}%`;
    }

    // ════════════════════════════════════════════════
    //  KEYBOARD
    // ════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
        const max = phasesData.length;
        if (e.key === 'ArrowLeft'  && currentPhase > 1)   showPhase(currentPhase - 1);
        if (e.key === 'ArrowRight' && currentPhase < max)  showPhase(currentPhase + 1);
        if (e.key === 'Escape') {
            if (document.getElementById('megaMenu').classList.contains('open')) closeMegaMenu();
            else if (currentPhase > 0) showHome();
        }
    });
    </script>
</body>
</html>
